<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      viewport-fit=cover makes env(safe-area-inset-*) resolve to real device insets.
      maximum-scale=1.0 + user-scalable=no stop iOS WKWebView from auto-zooming when a
      focused input has a computed font-size below 16px. See CLAUDE.md (iOS input zoom).
    -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no"
    />
    <!--
      Single source of truth for the input-zoom fix. The !important is required to beat
      Tailwind's md:text-sm utility; do not remove it (see CLAUDE.md). Never add a
      per-component font-size override as a workaround.
    -->
    <style>
      input,
      textarea,
      select {
        /* biome-ignore lint/complexity/noImportantStyles: required to beat Tailwind's md:text-sm so iOS WKWebView never auto-zooms a focused input (CLAUDE.md). */
        font-size: 16px !important;
      }
    </style>
    <title>Dummy App</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
